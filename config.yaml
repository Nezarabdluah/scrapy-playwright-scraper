# ============================================================
# Scraper Configuration - your-uni.com Universities
# ============================================================

# Target configuration
target_url: "https://your-uni.com/%D8%AC%D8%A7%D9%85%D8%B9%D8%A7%D8%AA-%D9%85%D8%A7%D9%84%D9%8A%D8%B2%D9%8A%D8%A7/"
base_url: "https://your-uni.com"

# Output configuration
output:
  project: "your_uni"         # Website/Project name
  folder: "universities_ar"   # Section Name (Courses, Universities, etc)
  filename: "universities"    # File name
  csv: true
  json: true
  sqlite: true

# Authentication (not needed)
auth:
  enabled: false
  username_field: "username"
  password_field: "password"
  submit_selector: "button[type=submit]"
  success_selector: ".dashboard"

# Extraction mode: "sections" for heading-based pages, "list" for table/card pages
extraction_mode: "sections"

# CSS Selectors for list-based extraction
selectors:
  items_list: "tbody tr"
  title: "td:nth-child(1)"
  description: ""
  price: "td:nth-child(2)"
  link: "td:nth-child(3) a"
  date: ""
  image: ""

# Section-specific selectors (used when extraction_mode = "sections")
section_selectors:
  title: "a"
  description_sibling: "p"
  read_more_text: "إقراء المزيد"

# Pagination settings
pagination:
  type: "url_param"
  next_selector: ""
  url_param: "page"
  max_pages: 320

# Wait settings
wait:
  enabled: true
  selector: "h3"
  timeout: 120000

# Request delays
delays:
  min: 2.0
  max: 5.0

# Browser settings
browser:
  headless: true
  viewport_width: 1920
  viewport_height: 1080


# Proxy (disabled)
proxy:
  enabled: false
  rotation: true

# Misc
respect_robots_txt: false
max_retries: 3
log_level: "INFO"
